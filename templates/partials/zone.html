<div id="zone-{{ zone.id }}"
     class="zone-row{% if !zone.is_on() %} off{% endif %}"
     sse-swap="zone-{{ zone.id }}" hx-swap="outerHTML">

  <div class="zone-name">
    <div class="name-line">
      <button class="zone-toggle {{ zone.power_class() }}"
              type="button"
              aria-pressed="{% if zone.is_on() %}true{% else %}false{% endif %}"
              aria-label="toggle zone power"
              title="Power: {{ zone.power_class() }}"
              hx-post="/zone/{{ zone.id }}/power"
              hx-vals='{"power":"toggle"}'
              hx-target="#zone-{{ zone.id }}"></button>
      <span class="name">{{ zone.name }}</span>
      {% if !zone.flags.is_empty() %}
      <div class="zone-flags">
        {% for f in zone.flags %}
        <span class="flag{{ zone.flag_class(f) }}" title="{{ f }}">
          {% if zone.flag_is_battery(f) %}
          <img class="battery-icon" src="/icons/battery-low.svg" alt="low battery" />
          {% else %}
          {% if let Some(g) = zone.flag_glyph(f) %}{{ g }}{% else %}{{ f }}{% endif %}
          {% endif %}
        </span>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </div>

  <div class="zone-temp{% if zone.has_sensor %} has-sensor{% endif %}">{{ zone.sensor_display() }}</div>

  <div class="zone-controls">
    <button class="btn step" type="button" aria-label="decrement"
            hx-post="/zone/{{ zone.id }}/step"
            hx-vals='{"dir":"down"}'
            hx-target="#zone-{{ zone.id }}">
      <svg class="step-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
      </svg>
    </button>
    <button class="val" type="button"
            title="tap to switch % / C control"
            {% if !zone.has_sensor %} disabled{% endif %}
            {% if zone.has_sensor %}
            hx-post="/zone/{{ zone.id }}/control-type/toggle"
            hx-target="#zone-{{ zone.id }}"
            {% endif %}>{{ zone.value_display() }}</button>
    <button class="btn step" type="button" aria-label="increment"
            hx-post="/zone/{{ zone.id }}/step"
            hx-vals='{"dir":"up"}'
            hx-target="#zone-{{ zone.id }}">
      <svg class="step-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <line x1="5" y1="12" x2="19" y2="12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
        <line x1="12" y1="5" x2="12" y2="19" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" />
      </svg>
    </button>
  </div>
</div>
