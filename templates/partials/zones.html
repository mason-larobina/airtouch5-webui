<div id="zones" class="zone-list" hx-swap="outerHTML">
  <div class="bulk-bar" data-bulk-mode="{{ bulk_mode.as_str() }}">
    <div class="power-group">
      <button type="button" class="btn"
              hx-post="/zones/power" hx-vals='{"power":"on"}'
              hx-target="#zones">ON</button>
      <button type="button" class="btn"
              hx-post="/zones/power" hx-vals='{"power":"off"}'
              hx-target="#zones">OFF</button>
    </div>
    <div class="bulk-presets">
      <div class="preset-row preset-airflow">
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"airflow","value":"25"}'
                hx-target="#zones">25</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"airflow","value":"50"}'
                hx-target="#zones">50</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"airflow","value":"75"}'
                hx-target="#zones">75</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"airflow","value":"100"}'
                hx-target="#zones">100</button>
      </div>
      {% if snapshot.bulk_temp_available() %}
      <div class="preset-row preset-temperature">
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"temperature","value":"20"}'
                hx-target="#zones">20</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"temperature","value":"21"}'
                hx-target="#zones">21</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"temperature","value":"22"}'
                hx-target="#zones">22</button>
        <button class="btn preset" type="button"
                hx-post="/zones/preset" hx-vals='{"mode":"temperature","value":"23"}'
                hx-target="#zones">23</button>
      </div>
      {% endif %}
    </div>
    <div class="mode-toggle bulk-mode" role="group" aria-label="all zones preset mode">
      <button type="button" data-mode="airflow"
              {% if bulk_mode.is_airflow() %} class="active" aria-pressed="true"{% endif %}>%</button>
      <button type="button" data-mode="temperature"
              {% if bulk_mode.is_temperature() %} class="active" aria-pressed="true"{% endif %}
              {% if !snapshot.bulk_temp_available() %} disabled{% endif %}>°C</button>
    </div>
  </div>
  {% for zone in snapshot.zones.values() %}
  {% include "partials/zone.html" %}
  {% endfor %}
  {% if snapshot.zones.is_empty() %}
  <div class="zone-row"><div class="zone-name"><span class="err-line">No zones discovered yet.</span></div></div>
  {% endif %}
</div>
