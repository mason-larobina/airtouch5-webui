<!DOCTYPE html>
<html lang="en" data-theme="{{ theme.name }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Web UI for an AirTouch 5 air conditioning console: live AC and zone control, no app required.">
  <meta name="theme-color" content="{{ theme.bg }}">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' rx='3' fill='%234f9dff'/%3E%3Cpath d='M3 5h10M3 8h7M3 11h10' stroke='%23ffffff' stroke-width='1.6' stroke-linecap='round'/%3E%3C/svg%3E">
  <title>AirTouch5</title>
  <script src="/vendor/htmx-2.0.4.js"></script>
  <script src="/vendor/htmx-ext-sse-2.2.4.js"></script>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
  {% block content %}{% endblock %}
  <script>
    // The All-zones % / Temp toggle is purely visual: it only swaps which
    // preset row is visible. No request is sent -- the actual command goes
    // out when a preset button is clicked. We use delegation so this keeps
    // working after htmx swaps the #zones partial back in.
    document.addEventListener("click", function (ev) {
      var btn = ev.target.closest &&
        ev.target.closest(".bulk-bar .bulk-mode button[data-mode]");
      if (!btn || btn.disabled) return;
      var bar = btn.closest(".bulk-bar");
      if (!bar) return;
      bar.setAttribute("data-bulk-mode", btn.getAttribute("data-mode"));
      bar.querySelectorAll(".bulk-mode button[data-mode]").forEach(function (b) {
        if (b === btn) {
          b.classList.add("active");
          b.setAttribute("aria-pressed", "true");
        } else {
          b.classList.remove("active");
          b.removeAttribute("aria-pressed");
        }
      });
    });
    // Theme selector: swap the palette instantly by setting data-theme on
    // <html> and keep <meta name="theme-color"> in step. The hx-post on the
    // button persists the choice in a cookie; the server renders data-theme
    // from that cookie on the next full page load, so there is no flash of
    // the wrong theme. Delegated so it keeps working if the selector is ever
    // re-rendered by htmx.
    document.addEventListener("click", function (ev) {
      var btn = ev.target.closest && ev.target.closest("[data-set-theme]");
      if (!btn) return;
      document.documentElement.setAttribute(
        "data-theme", btn.getAttribute("data-set-theme"));
      var meta = document.querySelector('meta[name="theme-color"]');
      if (meta) {
        meta.setAttribute("content", btn.getAttribute("data-theme-bg"));
      }
      document.querySelectorAll("[data-set-theme]").forEach(function (b) {
        if (b === btn) {
          b.classList.add("active");
          b.setAttribute("aria-pressed", "true");
        } else {
          b.classList.remove("active");
          b.removeAttribute("aria-pressed");
        }
      });
    });
  </script>
</body>
</html>
